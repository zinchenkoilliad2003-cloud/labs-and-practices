<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Практична робота №4</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/practice_4.css">
</head>
<body>
    <div class="keyboard-base">
        <div class="key">Esc</div><div class="gap-2"></div>
        <div class="key">F1</div><div class="key">F2</div><div class="key">F3</div><div class="key">F4</div><div class="gap-1"></div>
        <div class="key">F5</div><div class="key">F6</div><div class="key">F7</div><div class="key">F8</div><div class="gap-1"></div>
        <div class="key">F9</div><div class="key">F10</div><div class="key">F11</div><div class="key">F12</div>
        <div class="gap-2"></div>
        <div class="key sys">PrtSc</div><div class="key sys">ScrLk</div><div class="key sys">Pause</div>
        <div class="gap-2"></div>
        <div class="gap-8"></div>

        <div class="key">~</div><div class="key">1</div><div class="key">2</div><div class="key">3</div>
        <div class="key">4</div><div class="key">5</div><div class="key">6</div><div class="key">7</div>
        <div class="key">8</div><div class="key">9</div><div class="key">0</div><div class="key">-</div>
        <div class="key">+</div><div class="key backspace">Backspace</div>
        <div class="gap-2"></div>
        <div class="key sys">Ins</div><div class="key sys">Home</div><div class="key sys">PgUp</div>
        <div class="gap-2"></div>
        <div class="key sys">NumLk</div><div class="key">/</div><div class="key">*</div><div class="key">-</div>

        <div class="key tab">Tab</div><div class="key">Q</div><div class="key">W</div><div class="key">E</div>
        <div class="key">R</div><div class="key">T</div><div class="key">Y</div><div class="key">U</div>
        <div class="key">I</div><div class="key">O</div><div class="key">P</div><div class="key">[</div>
        <div class="key">]</div><div class="key backslash">\</div>
        <div class="gap-2"></div>
        <div class="key sys">Del</div><div class="key sys">End</div><div class="key sys">PgDn</div>
        <div class="gap-2"></div>
        <div class="key">7</div><div class="key">8</div><div class="key">9</div><div class="key num-tall">+</div>

        <div class="key capslock">CapsLock</div><div class="key">A</div><div class="key">S</div><div class="key">D</div>
        <div class="key">F</div><div class="key">G</div><div class="key">H</div><div class="key">J</div>
        <div class="key">K</div><div class="key">L</div><div class="key">;</div><div class="key">'</div>
        <div class="key return">Enter</div>
        <div class="gap-2"></div>
        <div class="gap-6"></div>
        <div class="gap-2"></div>
        <div class="key">4</div><div class="key">5</div><div class="key">6</div>
        <div class="key leftshift">Shift</div><div class="key">Z</div><div class="key">X</div><div class="key">C</div>
        <div class="key">V</div><div class="key">B</div><div class="key">N</div><div class="key">M</div>
        <div class="key">,</div><div class="key">.</div><div class="key">/</div><div class="key rightshift">Shift</div>
        <div class="gap-2"></div>
        <div class="gap-2"></div><div class="key">↑</div><div class="gap-2"></div>
        <div class="gap-2"></div>
        <div class="key">1</div><div class="key">2</div><div class="key">3</div><div class="key num-tall">Enter</div>

        <div class="key ctrl">Ctrl</div><div class="key win">Win</div><div class="key alt">Alt</div>
        <div class="key space"></div>
        <div class="key alt">Alt</div><div class="key win">Win</div><div class="key ctrl">Ctrl</div>
        <div class="gap-2"></div>
        <div class="key">←</div><div class="key">↓</div><div class="key">→</div>
        <div class="gap-2"></div>
        <div class="key num-zero">0</div><div class="key">.</div>
        </div>
</body>
</html>
