<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота №1</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/practice_2.css">
</head>
<body>
    <header>
        <h2>Лабораторна робота №1. Форми</h2>
        <nav><a href="../../index.html#labs">Повернутися до списку лабораторних</a></nav>
    </header>

    <main>
        <h3>Форма реєстрації користувача</h3>
        <form class="styled-registration-form" action="https://webhook.site/6ddb6b79-ff6b-428a-9013-1dbec7c9aa39" method="POST">
            
            <div class="form-group">
                <label for="firstName">Ім'я</label><br>
                <input type="text" id="firstName" name="firstName" required>
            </div>

            <div class="form-group">
                <label for="lastName">Прізвище</label><br>
                <input type="text" id="lastName" name="lastName" required>
            </div>

            <div class="form-group">
                <label for="email">Електронна пошта</label><br>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label><br>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Підтвердження паролю</label><br>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>

            <div class="form-group">
                <label for="dob">Дата народження</label><br>
                <input type="date" id="dob" name="dob">
            </div>

            <div class="form-group">
                <label for="gender">Стать</label><br>
                <select id="gender" name="gender">
                    <option value="male">Чоловіча</option>
                    <option value="female">Жіноча</option>
                    <option value="other">Інша</option>
                </select>
            </div>

            <br>
            <input type="submit" value="Відправити дані">
        </form>
    </main>
</body>
</html>
