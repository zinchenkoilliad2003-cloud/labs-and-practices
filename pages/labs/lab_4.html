<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота №4</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/lab_4.css">
</head>
<body>
    <div class="planner-wrapper">
        <header class="area-header">
            <div class="header-main">
                <h1>WEEKLY PLAN</h1>
                <div class="header-inputs">
                    <label>WEEK OF <input type="text" class="line-input"></label>
                    <label>HEALTHY HABIT <input type="text" class="line-input"></label>
                </div>
            </div>
            <div class="header-checkboxes">
                <label>ROCKED IT <input type="checkbox"></label>
                <label>ROOM FOR IMPROVEMENT <input type="checkbox"></label>
            </div>
        </header>

        <div class="area-todo">
            <div class="todo-title">TO DO</div>
            
            <div class="todo-section">
                <h3>TOP 3 GOALS</h3>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
            </div>

            <div class="todo-section">
                <h3>EVERYTHING ELSE</h3>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
            </div>

            <div class="todo-section">
                <h3>NEXT WEEK</h3>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
                <div class="task"><input type="checkbox"><input type="text"></div>
            </div>
        </div>

        <div class="day-block area-mon">
            <div class="day-header">MONDAY <input type="checkbox"></div>
            <textarea></textarea>
        </div>
        <div class="day-block area-tue">
            <div class="day-header">TUESDAY <input type="checkbox"></div>
            <textarea></textarea>
        </div>
        <div class="day-block area-wed">
            <div class="day-header">WEDNESDAY <input type="checkbox"></div>
            <textarea></textarea>
        </div>
        <div class="day-block area-thu">
            <div class="day-header">THURSDAY <input type="checkbox"></div>
            <textarea></textarea>
        </div>
        <div class="day-block area-fri">
            <div class="day-header">FRIDAY <input type="checkbox"></div>
            <textarea></textarea>
        </div>
        <div class="day-block area-sat">
            <div class="day-header">SATURDAY <input type="checkbox"></div>
            <textarea></textarea>
        </div>
        <div class="day-block area-sun">
            <div class="day-header">SUNDAY <input type="checkbox"></div>
            <textarea></textarea>
        </div>
    </div>
</body>
</html>
